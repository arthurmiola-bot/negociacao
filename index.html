<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e4d8c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Negociacao" />
  <title>Negociacao</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul:    #1e4d8c;
      --azul-hdr:#163a6b;
      --azul-btn:#1a4278;
      --azul-lt: #ddeaf8;
      --azul-bd: #90b8e8;
      --verde:   #1a6b3a;
      --verde-lt:#d4f0e0;
      --verde-bd:#7dcfa0;
      --laranja: #c45c00;
      --lj-lt:   #fde8d4;
      --lj-bd:   #f0a870;
      --text:    #111111;
      --text2:   #333333;
      --text3:   #555555;
      --bg:      #f0f4f8;
      --card:    #ffffff;
      --bdr:     #cccccc;
      --font: system-ui, -apple-system, sans-serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: var(--font); color: var(--text); -webkit-tap-highlight-color: transparent; }
    #app { height: 100%; display: flex; flex-direction: column; }
    .hidden { display: none !important; }

    /* HEADER */
    .hdr { background: var(--azul-hdr); padding: calc(var(--safe-t) + 10px) 14px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .hdr-left { display: flex; align-items: center; gap: 8px; }
    .hdr-title { font-size: 19px; font-weight: 600; color: #fff; }
    .btn-ico { width: 34px; height: 34px; border: none; background: rgba(255,255,255,.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; flex-shrink: 0; }
    .btn-ico:active { background: rgba(255,255,255,.3); }

    /* MES BAR */
    .mes-bar { background: var(--azul); padding: 8px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .mes-bar label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.85); letter-spacing: .1em; white-space: nowrap; }
    .mes-select { flex: 1; background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3); border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; padding: 7px 10px; outline: none; cursor: pointer; }
    .mes-select option { background: var(--azul-hdr); color: #fff; }

    /* SCROLL */
    .scroll { flex: 1; overflow-y: auto; padding: 10px 12px; padding-bottom: calc(200px + var(--safe-b)); -webkit-overflow-scrolling: touch; }

    /* CARDS */
    .card { background: var(--card); border: 1.5px solid var(--bdr); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,.06); }
    .lbl { display: block; font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; }
    .field { width: 100%; border: 1.5px solid var(--bdr); border-radius: 9px; padding: 10px 12px; font-size: 15px; color: var(--text); background: #fff; outline: none; }
    .field:focus { border-color: var(--azul); }

    /* ABAS */
    .cat-tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab { flex-shrink: 0; padding: 6px 12px; border-radius: 100px; border: 1.5px solid var(--bdr); background: #fff; font-size: 12px; font-weight: 600; color: var(--text3); cursor: pointer; white-space: nowrap; }
    .cat-tab.active { background: var(--azul-btn); color: #fff; border-color: var(--azul-btn); }
    .cat-tab .badge { display: inline-block; background: rgba(255,255,255,.3); border-radius: 100px; padding: 0 5px; font-size: 10px; margin-left: 4px; }
    .cat-tab:not(.active) .badge { background: var(--azul-lt); color: var(--azul-btn); }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 8px; }
    .search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text3); }
    .search-input { width: 100%; border: 1.5px solid var(--bdr); border-radius: 9px; padding: 10px 12px 10px 33px; font-size: 14px; color: var(--text); background: #fff; outline: none; }
    .search-input:focus { border-color: var(--azul); }

    /* PRODUCT LIST */
    .prod-list { border: 1.5px solid var(--bdr); border-radius: 10px; overflow: hidden; max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #fff; }
    .pi { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid #eee; user-select: none; }
    .pi:last-child { border-bottom: none; }
    .pi-info { flex: 1; pointer-events: none; }
    .pi-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .pi-det { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .pi-plus { width: 30px; height: 30px; border-radius: 50%; background: var(--azul); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: #fff; font-size: 20px; font-weight: 300; }
    .pi-plus:active { transform: scale(.9); }
    .prod-empty { padding: 16px; text-align: center; font-size: 13px; color: var(--text3); }

    /* ITEM CARDS */
    .item-card { background: var(--card); border: 1.5px solid var(--bdr); border-radius: 14px; margin-bottom: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,.05); animation: slideIn .2s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .ic-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px 8px; }
    .ic-num { width: 22px; height: 22px; border-radius: 50%; background: var(--azul-lt); color: var(--azul-btn); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ic-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .ic-grupo { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 100px; background: var(--azul-lt); color: var(--azul-btn); flex-shrink: 0; }
    .ic-del { background: none; border: 1.5px solid var(--bdr); cursor: pointer; color: var(--text3); font-size: 14px; padding: 3px 6px; border-radius: 7px; }
    .ic-del:active { background: #fdecea; color: #c0392b; }

    /* INPUTS GRID */
    .ic-body { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; padding: 0 12px 10px; }
    .ig label { font-size: 9px; font-weight: 700; letter-spacing: .07em; color: var(--text3); display: block; margin-bottom: 4px; text-transform: uppercase; }
    .qty-inp, .neg-inp { width: 100%; border: 1.5px solid var(--bdr); border-radius: 8px; padding: 7px 6px; font-size: 14px; font-weight: 600; color: var(--text); background: #fff; outline: none; text-align: right; -moz-appearance: textfield; }
    .qty-inp::-webkit-outer-spin-button, .qty-inp::-webkit-inner-spin-button,
    .neg-inp::-webkit-outer-spin-button, .neg-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .qty-inp:focus { border-color: var(--azul); }
    .neg-inp { border-color: var(--azul-bd); background: var(--azul-lt); color: var(--azul-btn); }
    .neg-inp:focus { border-color: var(--azul); background: #fff; color: var(--text); }
    .preco-lista { font-size: 14px; font-weight: 600; color: var(--text2); padding: 7px 0 7px 4px; }

    /* FOOTER CARD */
    .ic-foot { border-top: 1.5px solid #eee; padding: 7px 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; background: var(--bg); }
    .ic-foot-item { display: flex; flex-direction: column; }
    .ic-foot-lbl { font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 2px; }
    .ic-foot-val { font-size: 13px; font-weight: 700; color: var(--text); }
    .ic-foot-val.verde { color: var(--verde); }
    .ic-foot-val.laranja { color: var(--laranja); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 36px 20px; }
    .empty-ico { font-size: 38px; opacity: .3; margin-bottom: 10px; }
    .empty-txt { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
    .empty-sub { font-size: 13px; color: var(--text3); }

    /* BOTTOM */
    .bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid var(--bdr); padding: 10px 14px calc(10px + var(--safe-b)); box-shadow: 0 -4px 20px rgba(0,0,0,.1); z-index: 20; }
    .b-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .b-box { flex: 1; background: var(--bg); border: 1.5px solid var(--bdr); border-radius: 10px; padding: 7px 10px; }
    .b-box-lbl { font-size: 9px; font-weight: 700; letter-spacing: .08em; color: var(--text3); text-transform: uppercase; margin-bottom: 2px; }
    .b-box-val { font-size: 17px; font-weight: 700; color: var(--text); }
    .b-margem { flex: 1; border-radius: 10px; padding: 7px 10px; border: 1.5px solid var(--verde-bd); background: var(--verde-lt); }
    .b-margem .b-box-val { color: var(--verde); font-size: 20px; }
    .b-margem.warn { border-color: var(--lj-bd); background: var(--lj-lt); }
    .b-margem.warn .b-box-val { color: var(--laranja); }
    .b-actions { display: flex; gap: 9px; }
    .btn-share { flex: 1; padding: 11px; border: 2px solid var(--azul); border-radius: 10px; background: #fff; color: var(--azul-btn); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-save { flex: 1; padding: 11px; border: none; border-radius: 10px; background: var(--azul-btn); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-share:active { background: var(--azul-lt); }
    .btn-save:active { opacity: .85; }

    /* DRAWER */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; }
    .drawer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 31; background: #fff; border-radius: 20px 20px 0 0; padding-bottom: var(--safe-b); max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(0,0,0,.15); animation: up .3s cubic-bezier(.32,.72,0,1); }
    @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .drawer-handle { width: 36px; height: 4px; background: var(--bdr); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .drawer-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 10px; border-bottom: 1.5px solid var(--bdr); flex-shrink: 0; }
    .drawer-title { font-size: 20px; font-weight: 600; color: var(--text); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 12px; }
    .hist-item { background: var(--bg); border: 1.5px solid var(--bdr); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .hist-cli { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .hist-row { display: flex; justify-content: space-between; align-items: baseline; }
    .hist-date { font-size: 12px; color: var(--text3); }
    .hist-val { font-size: 14px; font-weight: 700; color: var(--azul-btn); }
    .hist-det { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .hist-empty { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }

    /* TOAST */
    .toast { position: fixed; bottom: 210px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 9px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; z-index: 50; white-space: nowrap; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>

  <header class="hdr">

  <div class="mes-bar">
    <label>MES</label>

  <div class="scroll">

        <input class="search-input" id="busca" type="text" placeholder="Buscar produto..." autocomplete="off" />
      </div>
      <div class="prod-list" id="prod-list"></div>
    </div>

    <div id="cart-area"></div>
  </div>

  <div class="bottom">

      <div class="b-box">

        <div class="b-box-val" id="tot-lista">R$ 0,00</div>

    <div class="b-actions">

        Compartilhar

      <button class="btn-save" id="btn-save">

        Salvar

    </div>
  </div>
</div>

<div id="hist-overlay" class="overlay hidden"></div>
<div id="hist-drawer" class="drawer hidden">
  <div class="drawer-handle"></div>
  <div class="drawer-hdr">

    </button>
  </div>
  <div class="drawer-body" id="hist-list"></div>
</div>

<div class="toast" id="toast"></div>

// Setup mes selector
function setupMes(){
  var sel = document.getElementById('mes-select');
  sel.innerHTML = DATAS.map(function(d,i){ return '<option value="'+i+'">'+d+'</option>'; }).join('');
  // Default to current/closest month
  var now = new Date();
  var monthStr = now.toLocaleDateString('en-US',{month:'short',year:'2-digit'}).replace(' ','/')
                    .replace('Aug','Aug').replace('Sep','Sep');
  mesIdx = 0;
  sel.value = mesIdx;
  sel.addEventListener('change', function(){
    mesIdx = parseInt(sel.value);
    renderCart();
    renderList(document.getElementById('busca').value);
  });
}

function getVenda(p){ return p.v[mesIdx] || 0; }
function getCusto(p){ return p.c[mesIdx] || 0; }

    var count = cart.filter(function(c){ return c.p.grupo===g; }).length;
    var badge = count > 0 ? '<span class="badge">'+count+'</span>' : '';
    return '<button class="cat-tab'+(grupoAtual===g?' active':'')+'" data-g="'+g+'">'+g+badge+'</button>';
  }).join('');
  el.querySelectorAll('.cat-tab').forEach(function(btn){
    btn.addEventListener('click', function(){
      grupoAtual = btn.getAttribute('data-g');
      document.getElementById('busca').value = '';
      renderTabs();
      renderList('');
    });
  });
}

function renderList(q){
  var el = document.getElementById('prod-list');
  var f = (q||'').toLowerCase();
  var visible = PRODUTOS
    .filter(function(p){ return p.grupo === grupoAtual; })
    .filter(function(p){ return !cart.find(function(c){ return c.p.id===p.id; }); })
    .filter(function(p){ return !f || p.name.toLowerCase().indexOf(f)>=0; })
    .sort(function(a,b){ return a.name.localeCompare(b.name); });
  if(!visible.length){
    el.innerHTML='<div class="prod-empty">'+(!f?'Todos os produtos desta categoria ja adicionados':'Nenhum produto encontrado')+'</div>';
    return;
  }
  var html='';
  for(var i=0;i<visible.length;i++){
    var p=visible[i];
    html+='<div class="pi">'
      +'<div class="pi-info">'
      +'<div class="pi-name">'+p.name+'</div>'
      +'<div class="pi-det">Lista: R$ '+fmtBRL(getVenda(p))+'</div>'
      +'</div>'
      +'<button class="pi-plus" data-pid="'+p.id+'" type="button">+</button>'
      +'</div>';
  }
  el.innerHTML=html;
  el.querySelectorAll('.pi-plus').forEach(function(btn){
    var pid=btn.getAttribute('data-pid');
    function doAdd(e){
      e.preventDefault(); e.stopPropagation();
      var prod=PRODUTOS.find(function(p){ return p.id===pid; });
      if(prod) addItem(prod);
    }
    btn.addEventListener('touchend',doAdd,{passive:false});
    btn.addEventListener('click',doAdd);
  });
}

function addItem(p){
  if(cart.find(function(c){ return c.p.id===p.id; })) return;
  cart.push({p:p, qty:0, neg:0});
  renderTabs();
  renderList(document.getElementById('busca').value);
  renderCart();
  if(navigator.vibrate) navigator.vibrate(30);
}

function removeItem(id){
  cart=cart.filter(function(c){ return c.p.id!==id; });
  renderTabs();
  renderList(document.getElementById('busca').value);
  renderCart();
}

function setQty(id, val){
  var item=cart.find(function(c){ return c.p.id===id; });
  if(!item) return;
  item.qty = parseFloat(val)||0;
  updateItemDisplay(item);
  renderSummary();
}

function setNeg(id, val){
  var item=cart.find(function(c){ return c.p.id===id; });
  if(!item) return;
  item.neg = parseFloat(val)||0;
  updateItemDisplay(item);
  renderSummary();
}

function updateItemDisplay(item){
  var tlEl=document.getElementById('tl-'+item.p.id);
  var tnEl=document.getElementById('tn-'+item.p.id);
  var mgEl=document.getElementById('mg-'+item.p.id);
  if(!tlEl) return;
  var totLista = item.qty * getVenda(item.p);
  var totNeg   = item.qty * item.neg;
  var totCusto = item.qty * getCusto(item.p);
  tlEl.textContent = 'R$ '+fmtBRL(totLista);
  tnEl.textContent = 'R$ '+fmtBRL(totNeg);
  if(item.neg > 0 && item.qty > 0){
    var mg = (totNeg - totCusto) / totNeg;
    mgEl.textContent = fmtPct(mg);
    mgEl.className = 'ic-foot-val '+(mg >= 0.15 ? 'verde' : 'laranja');
  } else {
    mgEl.textContent = '--';
    mgEl.className = 'ic-foot-val';
  }
}

function renderCart(){
  var area=document.getElementById('cart-area');
  if(!cart.length){
    area.innerHTML='<div class="empty-state"><div class="empty-ico">&#128203;</div><div class="empty-txt">Adicione produtos</div><div class="empty-sub">Selecione a categoria e toque em +</div></div>';
    renderSummary(); return;
  }
  var html='';
  for(var i=0;i<cart.length;i++){
    var item=cart[i];
    var venda=getVenda(item.p);
    var totLista=item.qty*venda;
    var totNeg=item.qty*item.neg;
    var totCusto=item.qty*getCusto(item.p);
    var mgItem='--';
    var mgClass='ic-foot-val';
    if(item.neg>0 && item.qty>0){
      var mg=(totNeg-totCusto)/totNeg;
      mgItem=fmtPct(mg);
      mgClass='ic-foot-val '+(mg>=0.15?'verde':'laranja');
    }
    html+='<div class="item-card">'
      +'<div class="ic-head">'
      +'<div class="ic-num">'+(i+1)+'</div>'
      +'<div class="ic-name">'+item.p.name+'</div>'
      +'<span class="ic-grupo">'+item.p.grupo+'</span>'
      +'<button class="ic-del" data-delid="'+item.p.id+'">&#x2715;</button>'
      +'</div>'
      +'<div class="ic-body">'
      +'<div class="ig"><label>Qtde</label>'
      +'<input class="qty-inp" type="number" inputmode="decimal" min="0" value="'+(item.qty>0?item.qty:'')+'" data-qid="'+item.p.id+'" /></div>'
      +'<div class="ig"><label>Preco Lista</label>'
      +'<div class="preco-lista">R$ '+fmtBRL(venda)+'</div></div>'
      +'<div class="ig"><label>Preco Neg.</label>'
      +'<input class="neg-inp" type="number" inputmode="decimal" min="0" placeholder="0,00" value="'+(item.neg>0?item.neg:'')+'" data-nid="'+item.p.id+'" /></div>'
      +'</div>'
      +'<div class="ic-foot">'
      +'<div class="ic-foot-item"><div class="ic-foot-lbl">Total Lista</div><div class="ic-foot-val" id="tl-'+item.p.id+'">R$ '+fmtBRL(totLista)+'</div></div>'
      +'<div class="ic-foot-item"><div class="ic-foot-lbl">Total Neg.</div><div class="ic-foot-val" id="tn-'+item.p.id+'">R$ '+fmtBRL(totNeg)+'</div></div>'
      +'<div class="ic-foot-item"><div class="ic-foot-lbl">Margem Item</div><div class="'+mgClass+'" id="mg-'+item.p.id+'">'+mgItem+'</div></div>'
      +'</div></div>';
  }
  area.innerHTML=html;

  area.querySelectorAll('[data-delid]').forEach(function(btn){
    var did=btn.getAttribute('data-delid');
    function doDel(e){ e.preventDefault(); removeItem(did); }
    btn.addEventListener('touchend',doDel,{passive:false});
    btn.addEventListener('click',doDel);
  });
  area.querySelectorAll('[data-qid]').forEach(function(inp){
    inp.addEventListener('input',function(){ setQty(inp.getAttribute('data-qid'),inp.value); });
  });
  area.querySelectorAll('[data-nid]').forEach(function(inp){
    inp.addEventListener('input',function(){ setNeg(inp.getAttribute('data-nid'),inp.value); });
  });
  renderSummary();
}

function renderSummary(){
  var totLista=0, totNeg=0, totCusto=0;
  for(var i=0;i<cart.length;i++){
    var v=cart[i].qty*getVenda(cart[i].p);
    var n=cart[i].qty*cart[i].neg;
    var c=cart[i].qty*getCusto(cart[i].p);
    totLista+=v; totNeg+=n; totCusto+=c;
  }
  document.getElementById('tot-lista').textContent='R$ '+fmtBRL(totLista);
  document.getElementById('tot-neg').textContent='R$ '+fmtBRL(totNeg);
  var mBox=document.getElementById('margem-box');
  var mVal=document.getElementById('margem-val');
  if(totNeg>0 && totCusto>0){
    var margem=(totNeg-totCusto)/totNeg;
    mVal.textContent=fmtPct(margem);
    mBox.className='b-margem'+(margem<0.10?' warn':'');
  } else {
    mVal.textContent='--%';
    mBox.className='b-margem';
  }
}

function compartilhar(){
  if(!cart.length){ toast('Adicione produtos primeiro'); return; }
  var cli=document.getElementById('cliente').value||'Cliente';
  var mes=DATAS[mesIdx];
  var totLista=0,totNeg=0,totCusto=0,linhas=[];
  for(var i=0;i<cart.length;i++){
    var item=cart[i];
    var vl=item.qty*getVenda(item.p);
    var vn=item.qty*item.neg;
    var vc=item.qty*getCusto(item.p);
    totLista+=vl; totNeg+=vn; totCusto+=vc;
    var mgStr=vn>0?fmtPct((vn-vc)/vn):'--';
    linhas.push((i+1)+'. '+item.p.name+'\n   Qtde: '+item.qty+' | Lista: R$ '+fmtBRL(getVenda(item.p))+' | Neg: R$ '+fmtBRL(item.neg)+' | Margem: '+mgStr);
  }
  var margem=totNeg>0?(totNeg-totCusto)/totNeg:0;
  var txt='Negociacao - '+mes+'\nCliente: '+cli+'\n\n'+linhas.join('\n')+'\n\nTotal Lista: R$ '+fmtBRL(totLista)+'\nTotal Negociado: R$ '+fmtBRL(totNeg)+'\nMargem Media: '+fmtPct(margem);
  if(navigator.share){ navigator.share({title:'Negociacao',text:txt}).catch(function(){ copiar(txt); }); }
  else copiar(txt);
}

function copiar(txt){
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(function(){ toast('Copiado!'); }).catch(function(){ toast('Indisponivel'); });
  else toast('Indisponivel');
}

function salvar(){
  if(!cart.length){ toast('Adicione produtos primeiro'); return; }
  var cli=document.getElementById('cliente').value||'Cliente';
  var mes=DATAS[mesIdx];
  var totLista=0,totNeg=0,totCusto=0,items=[];
  for(var i=0;i<cart.length;i++){
    var item=cart[i];
    var vl=item.qty*getVenda(item.p);
    var vn=item.qty*item.neg;
    var vc=item.qty*getCusto(item.p);
    totLista+=vl; totNeg+=vn; totCusto+=vc;
    items.push({nome:item.p.name,grupo:item.p.grupo,qty:item.qty,precoLista:getVenda(item.p),precoNeg:item.neg,totLista:vl,totNeg:vn});
  }
  var margem=totNeg>0?(totNeg-totCusto)/totNeg:0;
  try{
    var h=JSON.parse(localStorage.getItem('neg_hist')||'[]');
    h.unshift({cliente:cli,mes:mes,items:items,totLista:totLista,totNeg:totNeg,margem:margem,dt:new Date().toISOString()});
    localStorage.setItem('neg_hist',JSON.stringify(h.slice(0,30)));
    toast('Salvo!');
    if(navigator.vibrate) navigator.vibrate([30,20,30]);
  }catch(e){ toast('Erro ao salvar'); }
}

function abrirHist(){
  document.getElementById('hist-overlay').classList.remove('hidden');
  document.getElementById('hist-drawer').classList.remove('hidden');
  var h=[];
  try{ h=JSON.parse(localStorage.getItem('neg_hist')||'[]'); }catch(e){}
  var el=document.getElementById('hist-list');
  if(!h.length){ el.innerHTML='<div class="hist-empty">Nenhum pedido salvo</div>'; return; }
  var html='';
  for(var i=0;i<h.length;i++){
    var s=h[i]; var d=new Date(s.dt);
    var ds=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    html+='<div class="hist-item"><div class="hist-cli">'+(s.cliente||'Cliente')+' <span style="font-size:11px;color:#888">'+s.mes+'</span></div>'
      +'<div class="hist-row"><span class="hist-date">'+ds+'</span><span class="hist-val">R$ '+fmtBRL(s.totNeg||0)+'</span></div>'
      +'<div class="hist-det">'+(s.items||[]).length+' produto(s) | Margem: '+fmtPct(s.margem||0)+'</div></div>';
  }
  el.innerHTML=html;
}

function fecharHist(){
  document.getElementById('hist-overlay').classList.add('hidden');
  document.getElementById('hist-drawer').classList.add('hidden');
}

var toastT;
function toast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove('show'); },2500);
}

document.addEventListener('DOMContentLoaded',function(){
  setupMes();
  renderTabs();
  renderList('');
  renderCart();
  document.getElementById('busca').addEventListener('input',function(e){ renderList(e.target.value); });
  document.getElementById('btn-hist').addEventListener('click',abrirHist);
  document.getElementById('btn-close-hist').addEventListener('click',fecharHist);
  document.getElementById('hist-overlay').addEventListener('click',fecharHist);
  document.getElementById('btn-share').addEventListener('click',compartilhar);
  document.getElementById('btn-save').addEventListener('click',salvar);
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){ r.unregister(); });
  });
}
</script>
</body>
</html>
